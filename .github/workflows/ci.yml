name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - run: mvn -B verify
      - name: Upload coverage to Codecov
        if: matrix.java == 21
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/target/site/jacoco/jacoco.xml"
          fail_ci_if_error: false
      - name: README compatibility table guard
        if: matrix.java == 21
        run: bash scripts/check-readme-compat.sh
      - name: Coverage summary
        if: matrix.java == 21
        run: |
          awk -F, 'FNR>1 {m+=$8; c+=$9} END {printf "**Line coverage: %.1f%%** (%d/%d lines)\n", c*100/(c+m), c, c+m}' \
            $(find . -path '*/site/jacoco/jacoco.csv') >> "$GITHUB_STEP_SUMMARY"
