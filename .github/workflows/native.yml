name: native-smoke

# GraalVM native-image smoke test. Native builds are slow, so this is not on the PR path:
# run it on demand (workflow_dispatch) or let the weekly schedule catch regressions. It
# proves fields: works in a native image once the exception type is registered — the
# escape hatch documented in docs/native.md — by running examples/native-smoke, whose
# binary exits non-zero if the fields: line is missing.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Mondays, 06:00 UTC

jobs:
  native-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install stacktale (snapshots) into the local repo
        run: mvn -B -q -DskipTests install
      - name: Build the native smoke image
        run: mvn -B -q -f examples/native-smoke/pom.xml -DskipTests package
      - name: Run it (asserts fields: survives native-image)
        run: ./examples/native-smoke/target/native-smoke
